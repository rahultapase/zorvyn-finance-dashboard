services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance
      POSTGRES_DB: finance_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://finance:finance@db:5432/finance_db
      JWT_SECRET: dev_secret
      NODE_ENV: development
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
